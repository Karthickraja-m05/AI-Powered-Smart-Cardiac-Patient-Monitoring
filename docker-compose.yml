# ═══════════════════════════════════════════════════════════════
# CardioSense AI — Docker Compose
# AI-Powered Smart Cardiac Patient Monitoring Platform
# ═══════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ── Backend (FastAPI) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cardiosense-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://cardio:cardio_secret@postgres:5432/cardiosense
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-change-me}
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./ml/models:/app/ml/models
    restart: unless-stopped

  # ── Frontend (React + Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cardiosense-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: cardiosense-db
    environment:
      POSTGRES_DB: cardiosense
      POSTGRES_USER: cardio
      POSTGRES_PASSWORD: cardio_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardio -d cardiosense"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: cardiosense-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
